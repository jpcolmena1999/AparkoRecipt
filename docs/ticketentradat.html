<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Recibo de Entrada - Aparko</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>

<style>
:root{
  --SCALE: 3.0;
  --BASE_TICKET_WIDTH: 58mm;
}

html,body{
  margin:0!important;
  padding:0!important;
  background:#fff!important;
  color:#000;
  font-family:Arial,sans-serif;
  -webkit-print-color-adjust:exact;
  print-color-adjust:exact;
}

@media print{
  @page{ size:A4; margin:0!important; }

  body{
    width:210mm!important;
    height:297mm!important;
    margin:0!important;
    padding:0!important;
    overflow:hidden!important;
  }

  .ticket{
    width:var(--BASE_TICKET_WIDTH);
    padding:0;
    transform:scale(var(--SCALE));
    transform-origin:top left;
  }

  *{box-sizing:border-box;max-width:100%!important;}
  img,svg,canvas{max-width:100%!important;height:auto!important;}
}

.ticket{
  width:var(--BASE_TICKET_WIDTH);
  padding:8px;
  font-size:12px;
}

h1{margin:0 0 4px 0;font-size:15px;font-weight:bold;}
p{margin:2px 0;}
.sep{border-top:1px solid #000;margin:6px 0;}

.etq{font-weight:bold;}
.placa{font-weight:bold;font-size:18px;}

.msgfact{
  font-size:12px;
  text-align:center;
  margin:6px 0;
  line-height:1.3;
}

.track-big{
  font-size:26px;
  font-weight:800;
  text-align:center;
  margin:8px 0 4px 0;
}

.track-small{
  font-size:12px;
  font-weight:800;
  text-align:center;
  margin:4px 0;
  word-break:break-all;
}

.qrwrap{
  display:flex;
  justify-content:center;
  align-items:center;
  margin:6px 0;
}

.qr{
  width:260px;
  height:260px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* En entrada no siempre hay total; lo dejamos pero puedes ocultarlo si quieres */
.total-etq{
  font-size:12px;
  font-weight:bold;
  text-align:center;
  margin-top:6px;
}

.total-val{
  font-size:34px;
  font-weight:900;
  text-align:center;
  margin-top:2px;
  line-height:1.05;
}

.msg-inf{
  font-size:11px;
  text-align:center;
  margin-top:8px;
  line-height:1.25;
  white-space:pre-wrap; /* ✅ respeta saltos de línea del mensaje */
}
</style>
</head>

<body>
<div class="ticket">

<!-- ✅ Empresa viene como Ve.Name -->
<h1 id="empresa">APARKO</h1>
<p><span class="etq">NIT:</span> <span id="nit"></span></p>
<p id="direccion"></p>
<p><span class="etq">HORARIO:</span> <span id="horario"></span></p>
<p id="poliza"></p>

<div class="sep"></div>

<!-- ✅ Placa viene como EntradaPlaca -->
<p><span class="etq">PLACA:</span> <span class="placa" id="placa"></span></p>
<p><span class="etq">TARIFA:</span> <span id="tipo"></span></p>

<!-- ✅ Fecha de entrada viene como fecha -->
<p><span class="etq">ENTRADA:</span> <span id="fentrada"></span></p>

<!-- En ticket de entrada estas suelen venir vacías -->
<p style="display:none;"><span class="etq">SALIDA:</span> <span id="fsalida"></span></p>
<p style="display:none;"><span class="etq">DURACIÓN:</span> <span id="duracion"></span></p>

<div class="sep"></div>

<!-- En entrada NO usamos bloque de factura; lo ocultamos -->
<div id="bloqueFactura" style="display:none;">
  <div id="msgFactura" class="msgfact"></div>
  <div id="trackBig" class="track-big"></div>
  <div class="qrwrap">
    <div id="qrcode" class="qr"></div>
  </div>
</div>

<div id="bloqueSimple" style="display:none;">
  <div id="trackSmall" class="track-small"></div>
</div>

<!-- Si no mandas total, se puede ocultar automático -->
<div id="bloqueTotal">
  <div class="total-etq">TOTAL A PAGAR</div>
  <div class="total-val">$<span id="total"></span></div>
</div>

<!-- ✅ MENSAJE QUE QUIERES: Ve.FacMensaje -->
<div id="msgSalida" class="msg-inf"></div>

<div class="sep"></div>

</div>

<script>
function qp(k){ return new URLSearchParams(location.search).get(k)||""; }

function isTruthy(v){
  if(v===undefined||v===null) return false;
  const s=String(v).trim().toLowerCase();
  return ["true","1","si","sí","yes","y"].includes(s);
}

function fmtCOP(n){
  const v=Number(String(n).replace(/[^0-9.-]/g,""));
  return isNaN(v)?String(n):v.toLocaleString("es-CO");
}

function setText(id,val){
  const el=document.getElementById(id);
  if(el) el.textContent=val||"";
}

function init(){
  // ✅ AppSheet manda: Ve.Name
  setText("empresa", qp("Ve.Name") || "APARKO");

  // ✅ AppSheet manda: DatosNit, DatosDireccion, DatosHorario, DatosPoliza
  setText("nit", qp("DatosNit"));
  setText("direccion", qp("DatosDireccion"));
  setText("horario", qp("DatosHorario"));
  setText("poliza", qp("DatosPoliza"));

  // ✅ AppSheet manda: EntradaPlaca, TipoPlaca, fecha
  setText("placa", qp("EntradaPlaca"));
  setText("tipo", qp("TipoPlaca"));
  setText("fentrada", qp("fecha"));

  // ✅ Mensaje inferior: Ve.FacMensaje
  setText("msgSalida", qp("Ve.FacMensaje"));

  // ✅ Si NO hay total en entrada, ocultamos el bloque
  const totalRaw = qp("SalidaValor") || qp("total") || "";
  const bloqueTotal = document.getElementById("bloqueTotal");
  if(!totalRaw){
    if(bloqueTotal) bloqueTotal.style.display = "none";
  }else{
    setText("total", fmtCOP(totalRaw));
  }

  // ✅ Si quieres usar Validaciones para mostrar/ocultar el QR o track en entrada:
  // Ve.ValidaRecibo / Ve.ValidaQr (vienen como "TRUE/FALSE" o "true/false")
  const validaQr = isTruthy(qp("Ve.ValidaQr"));
  const validaRecibo = isTruthy(qp("Ve.ValidaRecibo"));

  // Si quieres mostrar un QR con el link del usuario (Vs.LinkUser) cuando validaQr=TRUE:
  const linkUser = (qp("Vs.LinkUser")||"").trim();

  const bloqueFactura = document.getElementById("bloqueFactura");
  const bloqueSimple  = document.getElementById("bloqueSimple");

  if(validaQr && linkUser){
    // mostramos un QR simple abajo (usamos bloqueFactura como contenedor)
    bloqueSimple.style.display  = "none";
    bloqueFactura.style.display = "block";

    // mensaje arriba del QR (puedes cambiarlo)
    setText("msgFactura", "Escanea para ver tu recibo / información");
    setText("trackBig", " ");

    // crear QR
    const box=document.getElementById("qrcode");
    if(box){
      box.innerHTML="";
      new QRCode(box,{
        text: linkUser,
        width:260,
        height:260,
        correctLevel:QRCode.CorrectLevel.M
      });
    }
  }else{
    // si no hay QR, ocultamos todo ese bloque
    bloqueFactura.style.display = "none";
    bloqueSimple.style.display  = "none";
  }

  setTimeout(()=>{
    try{window.print();}catch(e){}
    setTimeout(()=>{try{window.close();}catch(e){}},600);
  },400);
}

if(document.readyState==="complete") init();
else window.addEventListener("load",init);
</script>

</body>
</html>
